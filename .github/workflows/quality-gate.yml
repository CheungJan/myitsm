name: Quality Gate

on:
  pull_request:
    branches: ["main", "master"]
  push:
    branches: ["main", "master"]

jobs:
  lint-type-test-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install 3.11

      - name: Install Dependencies
        run: uv sync --extra dev

      - name: Black Check
        run: uv run black --check app/ tests/ wsgi.py

      - name: Isort Check
        run: uv run isort --check-only app/ tests/ wsgi.py

      - name: Ruff Check
        run: uv run ruff check app/ tests/ wsgi.py

      - name: Mypy Strict
        run: uv run mypy --strict app/ tests/ wsgi.py --ignore-missing-imports

      - name: Pytest
        run: uv run pytest tests/ -q

      - name: Bandit
        run: uv run bandit -r app/ -x app_old
