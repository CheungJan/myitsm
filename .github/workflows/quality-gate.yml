name: Quality Gate

on:
  pull_request:
    branches: ["main", "master"]
  push:
    branches: ["main", "master"]

jobs:
  lint-type-test-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Black Check
        run: black --check app/ tests/ wsgi.py

      - name: Isort Check
        run: isort --check-only app/ tests/ wsgi.py

      - name: Ruff Check
        run: ruff check app/ tests/ wsgi.py

      - name: Mypy Strict
        run: mypy --strict app/ tests/ wsgi.py --ignore-missing-imports

      - name: Pytest
        run: pytest tests/ -q

      - name: Bandit
        run: bandit -r app/ -x app_old
