name: Quality Gate

on:
  pull_request:
    branches: ["main", "master"]
  push:
    branches: ["main", "master"]

jobs:
  lint-type-test-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black isort ruff mypy pytest bandit

      - name: Black Check
        run: black --check .

      - name: Isort Check
        run: isort --check-only .

      - name: Ruff Check
        run: ruff check .

      - name: Mypy Strict
        run: mypy --strict .

      - name: Pytest
        run: pytest -q

      - name: Bandit
        run: bandit -r .
